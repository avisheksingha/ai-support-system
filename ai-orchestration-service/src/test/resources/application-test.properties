# Test profile properties

# Disable all external integrations
spring.ai.openai.api-key=test-key
spring.ai.openai.chat.options.model=mock-model

# Override postgres properties (handled by dynamic property source but good to have defaults)
mcp.postgres.connections.ticket-db.url=${spring.datasource.url}
mcp.postgres.connections.ticket-db.username=${spring.datasource.username}

mcp.postgres.connections.orchestration-db.url=${spring.datasource.url}
mcp.postgres.connections.orchestration-db.username=${spring.datasource.username}

# Fast timeouts for tests
resilience4j.timelimiter.instances.github-mcp.timeout-duration=1s
resilience4j.timelimiter.instances.filesystem-mcp.timeout-duration=1s
resilience4j.timelimiter.instances.postgres-mcp.timeout-duration=1s
spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
messaging.outbox.delay=3600000


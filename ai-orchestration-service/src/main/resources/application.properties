# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=AI-ORCHESTRATION-SERVICE
server.port=8086


# ============================================
# ACTIVE PROFILE
# ============================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# ============================================
# ACTUATOR INFO
# ============================================
info.app.name=@project.name@
info.app.version=@project.version@
info.app.description=@project.description@
info.app.environment=${spring.profiles.active}
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.metrics.tags.application=${spring.application.name}


# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.version=OPENAPI_3_0
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# ============================================
# EUREKA DISCOVERY
# ============================================
eureka.instance.prefer-ip-address=true


# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# ============================================
# KAFKA CONFIGURATION
# ============================================
spring.kafka.consumer.group-id=orchestration-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aisupport.common.event
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# ============================================
# SPRING AI CONFIGURATION (Google GenAI Primary)
# ============================================
spring.ai.google.genai.project-id=${GOOGLE_CLOUD_PROJECT}
spring.ai.google.genai.location=${GOOGLE_CLOUD_LOCATION:us-central1}
spring.ai.google.genai.chat.model=gemini-2.5-flash
spring.ai.google.genai.chat.temperature=0.2
spring.ai.google.genai.chat.top-p=0.8

# Keep space for OpenAI integration easily
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=gpt-4o-mini


# ============================================
# ORCHESTRATION CONFIGURATION
# ============================================
orchestration.workflow.timeout-ms=30000
orchestration.tool.max-execution-time-ms=10000
orchestration.retry.max-attempts=3
orchestration.retry.backoff-ms=1000
orchestration.client.analysis-service-url=http://AI-ANALYSIS-SERVICE
orchestration.client.rag-service-url=http://RAG-SERVICE
orchestration.client.routing-service-url=http://ROUTING-SERVICE
orchestration.client.ticket-service-url=http://TICKET-SERVICE
orchestration.kafka.enabled=true
orchestration.ai.default-provider=google-genai
orchestration.memory.enabled=false
orchestration.prompt.source=classpath
orchestration.guardrail.enabled=false
orchestration.agent.max-iterations=5
orchestration.metrics.enabled=true

# ============================================
# RESILIENCE4J CONFIGURATION
# ============================================
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s

resilience4j.circuitbreaker.instances.analysis.base-config=default
resilience4j.retry.instances.analysis.max-attempts=3
resilience4j.retry.instances.analysis.wait-duration=1s

resilience4j.circuitbreaker.instances.rag.base-config=default
resilience4j.retry.instances.rag.max-attempts=3
resilience4j.retry.instances.rag.wait-duration=1s

resilience4j.circuitbreaker.instances.routing.base-config=default
resilience4j.retry.instances.routing.max-attempts=3
resilience4j.retry.instances.routing.wait-duration=1s

resilience4j.circuitbreaker.instances.github-mcp.base-config=default

resilience4j.retry.instances.github-mcp.max-attempts=3
resilience4j.retry.instances.github-mcp.wait-duration=1s
resilience4j.retry.instances.github-mcp.retry-exceptions=com.aisupport.orchestration.infrastructure.mcp.exception.McpTransientException
resilience4j.retry.instances.github-mcp.ignore-exceptions=com.aisupport.orchestration.infrastructure.mcp.exception.McpException

resilience4j.timelimiter.instances.github-mcp.timeout-duration=10s

resilience4j.circuitbreaker.instances.filesystem-mcp.base-config=default

resilience4j.retry.instances.filesystem-mcp.max-attempts=3
resilience4j.retry.instances.filesystem-mcp.wait-duration=1s
resilience4j.retry.instances.filesystem-mcp.retry-exceptions=com.aisupport.orchestration.infrastructure.mcp.exception.McpTransientException
resilience4j.retry.instances.filesystem-mcp.ignore-exceptions=com.aisupport.orchestration.infrastructure.mcp.exception.McpException

# Filesystem access should be fast
resilience4j.timelimiter.instances.filesystem-mcp.timeout-duration=2s

resilience4j.circuitbreaker.instances.postgres-mcp.base-config=default

resilience4j.retry.instances.postgres-mcp.max-attempts=3
resilience4j.retry.instances.postgres-mcp.wait-duration=1s
resilience4j.retry.instances.postgres-mcp.retry-exceptions=com.aisupport.orchestration.infrastructure.mcp.exception.McpTransientException
resilience4j.retry.instances.postgres-mcp.ignore-exceptions=com.aisupport.orchestration.infrastructure.mcp.exception.McpException

# Database queries might take longer
resilience4j.timelimiter.instances.postgres-mcp.timeout-duration=5s

# ============================================
# EXTERNAL MCP CAPABILITIES
# ============================================
mcp.github.enabled=true
mcp.github.mode=mock

mcp.filesystem.enabled=true
mcp.filesystem.mode=mock
mcp.filesystem.workspace-root=f:/Workspace/ai-support-system
mcp.filesystem.allowed-paths[0]=README.md
mcp.filesystem.allowed-paths[1]=OVERVIEW.md
mcp.filesystem.allowed-paths[2]=ARCHITECTURE.md
mcp.filesystem.allowed-paths[3]=ARCHITECTURE_VERSION.md
mcp.filesystem.allowed-paths[4]=SECURITY.md
mcp.filesystem.allowed-paths[5]=TESTING.md
mcp.filesystem.allowed-paths[6]=CONTRIBUTING.md
mcp.filesystem.allowed-paths[7]=GEMINI.md
mcp.filesystem.allowed-paths[8]=docs/
mcp.filesystem.allowed-paths[9]=infra/
mcp.filesystem.allowed-paths[10]=ai-orchestration-service/src/main/resources/prompts/
mcp.filesystem.allowed-paths[11]=logs/

mcp.postgres.enabled=true
mcp.postgres.mode=mock

# ticket-db
mcp.postgres.connections.ticket-db.url=jdbc:postgresql://localhost:5432/ticket_db
mcp.postgres.connections.ticket-db.username=readonly_user
mcp.postgres.connections.ticket-db.purpose=Customer Tickets
mcp.postgres.connections.ticket-db.allowed-schemas[0]=public
mcp.postgres.connections.ticket-db.allowed-tables[0]=tickets
mcp.postgres.connections.ticket-db.allowed-tables[1]=agents
mcp.postgres.connections.ticket-db.allowed-tables[2]=customers

# orchestration-db
mcp.postgres.connections.orchestration-db.url=jdbc:postgresql://localhost:5432/orchestration_db
mcp.postgres.connections.orchestration-db.username=readonly_user
mcp.postgres.connections.orchestration-db.purpose=Workflow Runtime
mcp.postgres.connections.orchestration-db.allowed-schemas[0]=public
mcp.postgres.connections.orchestration-db.allowed-tables[0]=workflow_execution
mcp.postgres.connections.orchestration-db.allowed-tables[1]=workflow_checkpoint
mcp.postgres.connections.orchestration-db.allowed-tables[2]=tool_execution
mcp.postgres.connections.orchestration-db.allowed-tables[3]=ai_execution_record

# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=AI-ORCHESTRATION-SERVICE
server.port=8086


# ============================================
# ACTIVE PROFILE
# ============================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# ============================================
# ACTUATOR INFO
# ============================================
info.app.name=@project.name@
info.app.version=@project.version@
info.app.description=@project.description@
info.app.environment=${spring.profiles.active}
management.metrics.tags.application=${spring.application.name}


# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.version=OPENAPI_3_0
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# ============================================
# COMMON CONFIGURATION (Shared across all services)
# ============================================
spring.config.import=classpath:common-application.properties


# ============================================
# MICROSERVICE API URLS (Discovered via Eureka)
# ============================================
api.services.auth.url=http://AUTH-SERVICE
api.services.ticket.url=http://TICKET-SERVICE
api.services.ai-analysis.url=http://AI-ANALYSIS-SERVICE
api.services.routing.url=http://ROUTING-SERVICE
api.services.rag.url=http://RAG-SERVICE


# ============================================
# ORCHESTRATION CONFIGURATION
# ============================================

# --- Workflow & Execution ---
orchestration.workflow.timeout-ms=30000
orchestration.tool.max-execution-time-ms=10000
orchestration.agent.max-iterations=5

# --- Retry Policy ---
orchestration.retry.max-attempts=3
orchestration.retry.backoff-ms=1000

# --- Downstream Client URLs (resolved from api.services.*) ---
orchestration.client.analysis-service-url=${api.services.ai-analysis.url:http://AI-ANALYSIS-SERVICE}
orchestration.client.rag-service-url=${api.services.rag.url:http://RAG-SERVICE}
orchestration.client.routing-service-url=${api.services.routing.url:http://ROUTING-SERVICE}
orchestration.client.ticket-service-url=${api.services.ticket.url:http://TICKET-SERVICE}

# --- AI Provider & Prompting ---
orchestration.ai.default-provider=google-genai
orchestration.prompt.source=classpath
orchestration.memory.enabled=false
orchestration.guardrail.enabled=false

# --- Messaging ---
orchestration.kafka.enabled=true

# --- Observability ---
orchestration.metrics.enabled=true

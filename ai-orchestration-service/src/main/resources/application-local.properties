# ============================================
# DATABASE CONFIGURATION (Local)
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5433/orchestration_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5


# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# ============================================
# EUREKA CLIENT CONFIGURATION (Local)
# ============================================
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost


# ============================================
# RESILIENCE4J CONFIGURATION
# ============================================

# --- Shared Circuit Breaker Config ---
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s

# --- Shared Retry Config (backend microservices: analysis, rag, routing) ---
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=1s

# --- Shared Retry Config (MCP tools: same attempts/backoff + exception policy) ---
resilience4j.retry.configs.mcp-default.max-attempts=3
resilience4j.retry.configs.mcp-default.wait-duration=1s
resilience4j.retry.configs.mcp-default.retry-exceptions=com.aisupport.orchestration.infrastructure.mcp.exception.McpTransientException
resilience4j.retry.configs.mcp-default.ignore-exceptions=com.aisupport.orchestration.infrastructure.mcp.exception.McpException

# --- Analysis Service ---
resilience4j.circuitbreaker.instances.analysis.base-config=default
resilience4j.retry.instances.analysis.base-config=default
resilience4j.timelimiter.instances.analysis.timeout-duration=3s

# --- RAG Service ---
resilience4j.circuitbreaker.instances.rag.base-config=default
resilience4j.retry.instances.rag.base-config=default
resilience4j.timelimiter.instances.rag.timeout-duration=3s

# --- Routing Service ---
resilience4j.circuitbreaker.instances.routing.base-config=default
resilience4j.retry.instances.routing.base-config=default
resilience4j.timelimiter.instances.routing.timeout-duration=3s

# --- GitHub MCP Tool ---
resilience4j.circuitbreaker.instances.github-mcp.base-config=default
resilience4j.retry.instances.github-mcp.base-config=mcp-default
resilience4j.timelimiter.instances.github-mcp.timeout-duration=10s

# --- Filesystem MCP Tool (fast local access) ---
resilience4j.circuitbreaker.instances.filesystem-mcp.base-config=default
resilience4j.retry.instances.filesystem-mcp.base-config=mcp-default
resilience4j.timelimiter.instances.filesystem-mcp.timeout-duration=2s

# --- Postgres MCP Tool (queries may take longer) ---
resilience4j.circuitbreaker.instances.postgres-mcp.base-config=default
resilience4j.retry.instances.postgres-mcp.base-config=mcp-default
resilience4j.timelimiter.instances.postgres-mcp.timeout-duration=5s


# ============================================
# KAFKA CONFIGURATION
# ============================================
spring.kafka.bootstrap-servers=localhost:29092

# --- Consumer Settings ---
spring.kafka.consumer.group-id=ai-orchestration-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# Use ErrorHandlingDeserializer to prevent infinite crash loops on bad messages
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Delegate to String and Json deserializers
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust packages to allow deserialization of your event classes
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aisupport.*

# --- Consumer Performance Tuning ---
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.max.poll.records=10

# --- Listener Settings ---
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=2
spring.kafka.listener.missing-topics-fatal=false

# --- Producer Settings ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Allow producer to embed type headers so consumers know what class to use
spring.kafka.producer.properties.spring.json.add.type.headers=true

# --- Producer Reliability Settings ---
spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# --- Producer Timeout Settings ---
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.retry.backoff.ms=1000
spring.kafka.producer.properties.linger.ms=10


# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha


# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.com.aisupport.orchestration=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=WARN

# Include correlationId from MDC in every log line
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name},%X{correlationId:-no-correlation-id}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name},%X{correlationId:-no-correlation-id}] %logger{36} - %msg%n

# Enable detailed request logging (for debugging purposes)
spring.mvc.log-request-details=true

# File Output
logging.file.name=./logs/${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=3
logging.logback.rollingpolicy.total-size-cap=1GB


# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true


# ============================================
# SPRING AI CONFIGURATION
# ============================================
spring.ai.google.genai.project-id=${GOOGLE_CLOUD_PROJECT}
spring.ai.google.genai.location=${GOOGLE_CLOUD_LOCATION:us-central1}
spring.ai.google.genai.chat.model=gemini-2.5-flash
spring.ai.google.genai.chat.temperature=0.2
spring.ai.google.genai.chat.top-p=0.8
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=gpt-4o-mini


# ============================================
# EXTERNAL MCP CAPABILITIES
# ============================================

# GitHub MCP
mcp.github.enabled=true
mcp.github.mode=mock
mcp.filesystem.enabled=true
mcp.filesystem.mode=mock

# FileSystem MCP
mcp.filesystem.workspace-root=f:/Workspace/ai-support-system
mcp.filesystem.allowed-paths[0]=README.md
mcp.filesystem.allowed-paths[1]=OVERVIEW.md
mcp.filesystem.allowed-paths[2]=ARCHITECTURE.md
mcp.filesystem.allowed-paths[3]=ARCHITECTURE_VERSION.md
mcp.filesystem.allowed-paths[4]=SECURITY.md
mcp.filesystem.allowed-paths[5]=TESTING.md
mcp.filesystem.allowed-paths[6]=CONTRIBUTING.md
mcp.filesystem.allowed-paths[7]=GEMINI.md
mcp.filesystem.allowed-paths[8]=docs/
mcp.filesystem.allowed-paths[9]=infra/
mcp.filesystem.allowed-paths[10]=ai-orchestration-service/src/main/resources/prompts/
mcp.filesystem.allowed-paths[11]=logs/

# PostgreSQL MCP
mcp.postgres.enabled=true
mcp.postgres.mode=mock
mcp.postgres.connections.ticket-db.url=jdbc:postgresql://localhost:5433/ticket_db
mcp.postgres.connections.ticket-db.username=readonly_user
mcp.postgres.connections.ticket-db.purpose=Customer Tickets
mcp.postgres.connections.ticket-db.allowed-schemas[0]=public
mcp.postgres.connections.ticket-db.allowed-tables[0]=tickets
mcp.postgres.connections.ticket-db.allowed-tables[1]=agents
mcp.postgres.connections.ticket-db.allowed-tables[2]=customers
mcp.postgres.connections.orchestration-db.url=jdbc:postgresql://localhost:5433/orchestration_db
mcp.postgres.connections.orchestration-db.username=readonly_user
mcp.postgres.connections.orchestration-db.purpose=Workflow Runtime
mcp.postgres.connections.orchestration-db.allowed-schemas[0]=public
mcp.postgres.connections.orchestration-db.allowed-tables[0]=workflow_execution
mcp.postgres.connections.orchestration-db.allowed-tables[1]=workflow_checkpoint
mcp.postgres.connections.orchestration-db.allowed-tables[2]=tool_execution
mcp.postgres.connections.orchestration-db.allowed-tables[3]=ai_execution_record


# publish every 5 seconds
governance.outbox.poll-rate=5000

# cleanup every day at 2 AM
governance.outbox.cleanup.cron=0 0 2 * * *
# ===============================================
# DATABASE CONFIGURATION
# ===============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/analysis_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

#spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.minimum-idle=5
#spring.datasource.hikari.connection-timeout=30000
#spring.datasource.hikari.idle-timeout=600000
#spring.datasource.hikari.max-lifetime=1800000
#spring.datasource.hikari.pool-name=TicketServiceHikariPool

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.use_sql_comments=true
#spring.jpa.properties.hibernate.jdbc.batch_size=20
#spring.jpa.properties.hibernate.order_inserts=true
#spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
# spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
# spring.jackson.time-zone=Asia/Kolkata

# ===============================================
# EUREKA CLIENT CONFIGURATION
# ===============================================
eureka.client.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
# eureka.instance.prefer-ip-address=true

# Unique instance ID for Eureka registration
#eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
#eureka.instance.lease-renewal-interval-in-seconds=30
#eureka.instance.lease-expiration-duration-in-seconds=90

# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,flyway,caches
management.endpoint.health.show-details=always
management.info.env.enabled=true

#management.endpoint.health.probes.enabled=true
#management.health.livenessstate.enabled=true
#management.health.readinessstate.enabled=true
#management.metrics.tags.application=${spring.application.name}
#management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ===============================================
# LOGGING CONFIGURATION
# ===============================================
logging.level.root=INFO
logging.level.com.aisupport.ticket=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=WARN

# Enable detailed request logging (for debugging purposes)
spring.mvc.log-request-details=true

# File Output
logging.file.name=./logs/${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=3
logging.logback.rollingpolicy.total-size-cap=1GB

# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.swagger-ui.enabled=true
#springdoc.show-actuator=true

# ============================================
# GEMINI API CONFIGURATION
# ============================================

# ===============================================
# DATABASE CONFIGURATION
# ===============================================
spring.datasource.url=jdbc:postgresql://localhost:5433/analysis_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

#spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.minimum-idle=5
#spring.datasource.hikari.connection-timeout=30000
#spring.datasource.hikari.idle-timeout=600000
#spring.datasource.hikari.max-lifetime=1800000
#spring.datasource.hikari.pool-name=TicketServiceHikariPool

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.use_sql_comments=true
#spring.jpa.properties.hibernate.jdbc.batch_size=20
#spring.jpa.properties.hibernate.order_inserts=true
#spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
# spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
# spring.jackson.time-zone=Asia/Kolkata

# ===============================================
# EUREKA CLIENT CONFIGURATION
# ===============================================
eureka.client.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
# eureka.instance.prefer-ip-address=true

# Unique instance ID for Eureka registration
#eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
#eureka.instance.lease-renewal-interval-in-seconds=30
#eureka.instance.lease-expiration-duration-in-seconds=90

# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,flyway,caches
management.endpoint.health.show-details=always
management.info.env.enabled=true

#management.endpoint.health.probes.enabled=true
#management.health.livenessstate.enabled=true
#management.health.readinessstate.enabled=true
#management.metrics.tags.application=${spring.application.name}
#management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ===============================================
# LOGGING CONFIGURATION
# ===============================================
logging.level.root=INFO
logging.level.com.aisupport.ticket=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=WARN

# Include correlationId from MDC in every log line
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name},%X{correlationId:-no-correlation-id}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [${spring.application.name},%X{correlationId:-no-correlation-id}] %logger{36} - %msg%n

# Enable detailed request logging (for debugging purposes)
spring.mvc.log-request-details=true

# File Output
logging.file.name=./logs/${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=3
logging.logback.rollingpolicy.total-size-cap=1GB

# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
#springdoc.swagger-ui.enabled=true
#springdoc.show-actuator=true

# ============================================
# ACTIVE CHAT MODEL PROVIDER  (gemini | openai)
# ============================================
# Switch this single property to change the AI backend — no code changes needed.
chat.provider=gemini

# ============================================
# GEMINI API CONFIGURATION (Spring AI)
# ============================================
spring.ai.vertex.ai.gemini.project-id=${GCP_PROJECT_ID:ai-support-system-1234}
spring.ai.vertex.ai.gemini.location=${GCP_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.2
spring.ai.vertex.ai.gemini.chat.options.top-p=0.8
spring.ai.vertex.ai.gemini.chat.options.top-k=40
# Note: credentials are automatically loaded from GOOGLE_APPLICATION_CREDENTIALS
# Or can be set explicitly via spring.ai.vertex.ai.gemini.credentials-uri

# ============================================
# OPENAI CONFIGURATION (Spring AI)
# ============================================
spring.ai.openai.api-key=${OPENAI_API_KEY:your-openai-api-key-here}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.top-p=0.8

# ============================================
# RESILIENCE4J CONFIGURATION (Gemini)
# ============================================
resilience4j.ratelimiter.instances.geminiRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.geminiRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.geminiRateLimiter.timeout-duration=2s

resilience4j.circuitbreaker.instances.geminiCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.geminiCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.geminiCircuitBreaker.wait-duration-in-open-state=30s

# ============================================
# RESILIENCE4J CONFIGURATION (OpenAI)
# ============================================
resilience4j.ratelimiter.instances.openAiRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.openAiRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.openAiRateLimiter.timeout-duration=2s

resilience4j.circuitbreaker.instances.openAiCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.openAiCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openAiCircuitBreaker.wait-duration-in-open-state=30s

# ============================================
# KAFKA CONFIGURATION - CONSUMER & PRODUCER
# ============================================
spring.kafka.bootstrap-servers=localhost:9092

# --- Consumer
spring.kafka.consumer.group-id=ai-analysis-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# --- Consumer Deserializer Settings (consumes from ticket-created) ---
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- Consumer Performance Tuning ---
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.max.poll.records=10

# --- Listener ---
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=2
spring.kafka.listener.missing-topics-fatal=false

# --- Producer (publishes to ticket-analyzed) ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# --- Prevent producer from embedding its own package type header ---
spring.kafka.producer.properties.spring.json.add.type.headers=false

# --- Producer Reliability Settings ---
spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# --- Producer Timeout Settings ---
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.retry.backoff.ms=1000
spring.kafka.producer.properties.linger.ms=10



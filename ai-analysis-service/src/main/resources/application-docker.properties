# ===============================================
# DATABASE CONFIGURATION (Docker)
# ===============================================
spring.datasource.url=jdbc:postgresql://postgres:5433/analysis_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# ============================================
# JPA/HIBERNATE CONFIGURATION (Docker)
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# ===============================================
# EUREKA CLIENT CONFIGURATION (Docker)
# ===============================================
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
eureka.instance.hostname=ai-analysis-service
eureka.instance.prefer-ip-address=true

# ============================================
# KAFKA CONFIGURATION (Docker)
# ============================================
spring.kafka.bootstrap-servers=kafka:9092

# --- Consumer
spring.kafka.consumer.group-id=ai-analysis-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# --- Consumer Deserializer Settings (consumes from ticket-created) ---
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- Consumer Performance Tuning ---
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.max.poll.records=10

# --- Listener ---
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=2
spring.kafka.listener.missing-topics-fatal=false

# --- Producer (publishes to ticket-analyzed) ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# --- Prevent producer from embedding its own package type header ---
spring.kafka.producer.properties.spring.json.add.type.headers=false

# --- Producer Reliability Settings ---
spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# --- Producer Timeout Settings ---
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.retry.backoff.ms=1000
spring.kafka.producer.properties.linger.ms=10

# ============================================
# GEMINI API CONFIGURATION (Spring AI)
# ============================================
spring.ai.vertex.ai.gemini.project-id=${GOOGLE_CLOUD_PROJECT:${GCP_PROJECT_ID}}
spring.ai.vertex.ai.gemini.location=${GOOGLE_CLOUD_LOCATION:${GCP_LOCATION:us-central1}}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.2
spring.ai.vertex.ai.gemini.chat.options.top-p=0.8
spring.ai.vertex.ai.gemini.chat.options.top-k=40

# ============================================
# ACTIVE CHAT MODEL PROVIDER  (gemini | openai)
# ============================================
chat.provider=gemini

# ============================================
# OPENAI CONFIGURATION (Spring AI)
# ============================================
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.top-p=0.8

# ============================================
# RESILIENCE4J CONFIGURATION
# ============================================

# --- Gemini ---
resilience4j.ratelimiter.instances.geminiRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.geminiRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.geminiRateLimiter.timeout-duration=2s

resilience4j.circuitbreaker.instances.geminiCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.geminiCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.geminiCircuitBreaker.wait-duration-in-open-state=30s

# --- OpenAI ---
resilience4j.ratelimiter.instances.openAiRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.openAiRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.openAiRateLimiter.timeout-duration=2s

resilience4j.circuitbreaker.instances.openAiCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.openAiCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openAiCircuitBreaker.wait-duration-in-open-state=30s
# ===============================================
# LOGGING CONFIGURATION (Docker)
# ===============================================
logging.level.root=INFO
logging.level.com.aisupport=INFO
logging.level.org.springframework.web=INFO
spring.mvc.log-request-details=false

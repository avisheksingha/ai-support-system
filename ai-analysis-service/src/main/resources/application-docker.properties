# ============================================
# DATABASE CONFIGURATION (Docker)
# ============================================
spring.datasource.url=jdbc:postgresql://postgres:5433/analysis_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}


# ============================================
# JPA/HIBERNATE CONFIGURATION (Docker)
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# ============================================
# EUREKA CLIENT CONFIGURATION (Docker)
# ============================================
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
eureka.instance.hostname=ai-analysis-service
eureka.instance.prefer-ip-address=true


# ============================================
# RESILIENCE4J CONFIGURATION
# ============================================

# --- Google GenAI ---
resilience4j.ratelimiter.instances.googleGenAiRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.googleGenAiRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.googleGenAiRateLimiter.timeout-duration=2s

resilience4j.circuitbreaker.instances.googleGenAiCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.googleGenAiCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.googleGenAiCircuitBreaker.wait-duration-in-open-state=30s

# --- OpenAI ---
resilience4j.ratelimiter.instances.openAiRateLimiter.limit-for-period=5
resilience4j.ratelimiter.instances.openAiRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.openAiRateLimiter.timeout-duration=2s

resilience4j.circuitbreaker.instances.openAiCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.openAiCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.openAiCircuitBreaker.wait-duration-in-open-state=30s


# ============================================
# KAFKA CONFIGURATION (Docker)
# ============================================
spring.kafka.bootstrap-servers=kafka:9092

# --- Consumer
spring.kafka.consumer.group-id=ai-analysis-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# --- Consumer Deserializer Settings (consumes from ticket-created) ---
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- Consumer Performance Tuning ---
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.max.poll.records=10

# --- Listener ---
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=2
spring.kafka.listener.missing-topics-fatal=false

# --- Producer (publishes to ticket-analyzed) ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# --- Prevent producer from embedding its own package type header ---
spring.kafka.producer.properties.spring.json.add.type.headers=false

# --- Producer Reliability Settings ---
spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# --- Producer Timeout Settings ---
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.retry.backoff.ms=1000
spring.kafka.producer.properties.linger.ms=10


# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha


# ============================================
# LOGGING CONFIGURATION (Docker)
# ============================================
logging.level.root=INFO
logging.level.com.aisupport=INFO
logging.level.org.springframework.web=INFO
spring.mvc.log-request-details=false


# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true


# ============================================
# CUSTOM AI TELEMETRY CONFIGURATION
# ============================================
chat.provider=google-genai
chat.max-context-tokens=1048576


# ============================================
# GOOGLE GENAI API CONFIGURATION (Spring AI)
# ============================================
spring.ai.google.genai.project-id=${GOOGLE_CLOUD_PROJECT}
spring.ai.google.genai.location=${GOOGLE_CLOUD_LOCATION:us-central1}
spring.ai.google.genai.chat.model=gemini-2.5-flash
spring.ai.google.genai.chat.max-output-tokens=8192
spring.ai.google.genai.chat.temperature=0.2
spring.ai.google.genai.chat.top-p=0.8
spring.ai.google.genai.chat.top-k=40


# ============================================
# OPENAI CONFIGURATION (Spring AI)
# ============================================
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.model=gpt-4o-mini
spring.ai.openai.chat.temperature=0.2
spring.ai.openai.chat.top-p=0.8


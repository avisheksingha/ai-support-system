# Docker Compose -> Kubernetes mapping:
# Maps to:
#   services: discovery-service: build: ... 

apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
        - name: discovery-service
          image: discovery-service:v1
          # Critical for local K8s testing so it doesn't try to pull from Docker Hub
          imagePullPolicy: IfNotPresent 
          ports:
            - containerPort: 8761
              name: http
          envFrom:
            - configMapRef:
                name: discovery-service-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 10

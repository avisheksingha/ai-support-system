# Docker Compose -> Kubernetes mapping:
# Maps to the '.env' file in Docker Compose, but specifically for sensitive
# data (passwords, tokens, API keys). Non-sensitive data goes in ConfigMaps.

apiVersion: v1
kind: Secret
metadata:
  name: ai-support-secrets
  # We don't specify namespace here because Kustomize will inject it automatically
type: Opaque
stringData:
  # Using stringData instead of data allows us to write plain text 
  # without base64 encoding it manually. Kubernetes base64 encodes it upon creation.
  DB_USERNAME: postgres
  DB_PASSWORD: change-me
  JWT_SECRET: replace-with-a-strong-base64-encoded-secret
  OPENAI_API_KEY: sk-your-openai-api-key
  GOOGLE_API_KEY: your-google-api-key-if-using-express-mode

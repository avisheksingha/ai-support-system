# ===============================================
# DATABASE CONFIGURATION
# ===============================================
spring.datasource.url=jdbc:postgresql://localhost:5433/rag_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# Initialize the database schema and data on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# HikariCP Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# ===============================================
# EUREKA CLIENT CONFIGURATION
# ===============================================
eureka.client.enabled=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
# eureka.instance.prefer-ip-address=true

# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ===============================================
# LOGGING CONFIGURATION
# ===============================================
logging.level.root=INFO
logging.level.com.aisupport.rag=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=WARN

# Enable detailed request logging (for debugging purposes)
spring.mvc.log-request-details=true

# File Output
logging.file.name=./logs/${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=3
logging.logback.rollingpolicy.total-size-cap=1GB

# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# GEMINI CHAT MODEL CONFIGURATION (Spring AI)
# ============================================
spring.ai.vertex.ai.gemini.project-id=${GCP_PROJECT_ID:ai-support-system-1234}
spring.ai.vertex.ai.gemini.location=${GCP_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.0-flash

# ============================================
# VERTEX AI EMBEDDING MODEL CONFIGURATION (Spring AI)
# ============================================
spring.ai.vertex.ai.embedding.project-id=${GCP_PROJECT_ID:ai-support-system-1234}
spring.ai.vertex.ai.embedding.location=${GCP_LOCATION:us-central1}
spring.ai.vertex.ai.embedding.options.model=text-embedding-004

# ============================================
# VECTOR STORE CONFIGURATION (PGVector)
# ============================================
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=cosine
spring.ai.vectorstore.pgvector.index-type=hnsw

# ============================================
# KAFKA CONFIGURATION - CONSUMER & PRODUCER
# ============================================
spring.kafka.bootstrap-servers=localhost:9092

# --- Consumer ---
spring.kafka.consumer.group-id=rag-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# --- Consumer Deserializer Settings (consumes from ticket-analyzed) ---
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- Consumer Performance Tuning ---
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.max.poll.records=10

# --- Listener ---
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=2
spring.kafka.listener.missing-topics-fatal=false

# --- Producer Serializer Settings ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# --- Prevent producer from embedding its own package type header ---
spring.kafka.producer.properties.spring.json.add.type.headers=false

# --- Producer Reliability Settings ---
spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# --- Producer Timeout Settings ---
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.retry.backoff.ms=1000
spring.kafka.producer.properties.linger.ms=10


# ============================================
# DATABASE CONFIGURATION (Docker)
# ============================================
spring.datasource.url=jdbc:postgresql://postgres:5433/rag_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Initialize schema if needed by vector store
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true


# ============================================
# JPA/HIBERNATE CONFIGURATION (Docker)
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# ============================================
# EUREKA CLIENT CONFIGURATION (Docker)
# ============================================
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
eureka.instance.hostname=rag-service
eureka.instance.prefer-ip-address=true


# ============================================
# KAFKA CONFIGURATION (Docker)
# ============================================
spring.kafka.bootstrap-servers=kafka:9092

# --- Consumer ---
spring.kafka.consumer.group-id=rag-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# --- Consumer Deserializer Settings ---
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- Consumer Performance Tuning ---
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.max.poll.records=10

# --- Listener ---
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=2
spring.kafka.listener.missing-topics-fatal=false

# --- Producer Serializer Settings ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# --- Prevent producer from embedding package type header ---
spring.kafka.producer.properties.spring.json.add.type.headers=false

# --- Producer Reliability Settings ---
spring.kafka.producer.acks=all
spring.kafka.producer.retries=5
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# --- Producer Timeout Settings ---
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.retry.backoff.ms=1000
spring.kafka.producer.properties.linger.ms=10


# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha


# ============================================
# LOGGING CONFIGURATION (Docker)
# ============================================
logging.level.root=INFO
logging.level.com.aisupport=INFO
logging.level.org.springframework.web=INFO
spring.mvc.log-request-details=false


# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true


# ============================================
# GEMINI CHAT MODEL CONFIGURATION (Spring AI)
# ============================================
spring.ai.google.genai.project-id=${GOOGLE_CLOUD_PROJECT:${GCP_PROJECT_ID}}
spring.ai.google.genai.location=${GOOGLE_CLOUD_LOCATION:${GCP_LOCATION:us-central1}}
spring.ai.google.genai.chat.model=gemini-2.5-flash


# ============================================
# VECTOR STORE CONFIGURATION (PGVector)
# ============================================
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=cosine_distance
spring.ai.vectorstore.pgvector.index-type=hnsw


# ============================================
# VERTEX AI EMBEDDING MODEL CONFIGURATION (Spring AI)
# ============================================
spring.ai.vertex.ai.embedding.project-id=${GOOGLE_CLOUD_PROJECT:${GCP_PROJECT_ID}}
spring.ai.vertex.ai.embedding.location=${GOOGLE_CLOUD_LOCATION:${GCP_LOCATION:us-central1}}
spring.ai.vertex.ai.embedding.text.model=text-embedding-004


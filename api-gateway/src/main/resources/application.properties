# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=API-GATEWAY
server.port=8080

# ============================================
# ACTIVE PROFILE
# ============================================
spring.profiles.active=local

# ============================================
# ACTUATOR INFO
# ============================================
info.app.name=@project.name@
info.app.version=@project.version@
info.app.description=@project.description@
info.app.environment=${spring.profiles.active}

# ============================================
# SPRING CLOUD GATEWAY CONFIGURATION
# ============================================
spring.cloud.loadbalancer.enabled=true
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

# ============================================
# SPRING CLOUD GATEWAY ROUTES CONFIGURATION
# ============================================

# ---- Ticket Service ----
spring.cloud.gateway.routes[0].id=TICKET-SERVICE
spring.cloud.gateway.routes[0].uri=lb://TICKET-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/tickets/**

# ---- Routing Service ----
spring.cloud.gateway.routes[1].id=ROUTING-SERVICE
spring.cloud.gateway.routes[1].uri=lb://ROUTING-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/routing/**

# ---- RAG Service (optional now) ----
spring.cloud.gateway.routes[2].id=RAG-SERVICE
spring.cloud.gateway.routes[2].uri=lb://RAG-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/rag/**

# ============================================
# GLOBAL FILTER LOGGING CONFIGURATION
# ============================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO


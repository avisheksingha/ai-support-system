# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=API-GATEWAY
server.port=8080


# ============================================
# ACTIVE PROFILE
# ============================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# ============================================
# SPRING CLOUD GATEWAY CONFIGURATION
# ============================================
spring.cloud.loadbalancer.enabled=true
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true


# ============================================
# JWT CONFIGURATION
# ============================================
app.jwt.secret=${JWT_SECRET}
jwt.refresh-threshold-seconds=120


# ============================================
# ACTUATOR INFO
# ============================================
info.app.name=@project.name@
info.app.version=@project.version@
info.app.description=@project.description@
info.app.environment=${spring.profiles.active}


# ============================================
# SWAGGER UI AGGREGATION CONFIGURATION
# ============================================
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-docs/v3/api-docs
springdoc.swagger-ui.urls[1].name=Ticket Service
springdoc.swagger-ui.urls[1].url=/ticket-docs/v3/api-docs
springdoc.swagger-ui.urls[2].name=AI Analysis Service
springdoc.swagger-ui.urls[2].url=/analysis-docs/v3/api-docs
springdoc.swagger-ui.urls[3].name=Routing Service
springdoc.swagger-ui.urls[3].url=/routing-docs/v3/api-docs
springdoc.swagger-ui.urls[4].name=RAG Service
springdoc.swagger-ui.urls[4].url=/rag-docs/v3/api-docs
springdoc.swagger-ui.urls[5].name=AI Orchestration Service
springdoc.swagger-ui.urls[5].url=/orchestration-docs/v3/api-docs


# ============================================
# GLOBAL FILTER LOGGING CONFIGURATION
# ============================================
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO


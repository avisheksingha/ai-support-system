# ============================================
# DOWNSTREAM SERVICE URLS (GCP)
# ============================================
api.services.auth.url=${API_AUTH_SERVICE_URL:http://auth-service:8081}
api.services.ticket.url=${API_TICKET_SERVICE_URL:http://ticket-service:8082}
api.services.ai-analysis.url=${API_AI_ANALYSIS_SERVICE_URL:http://ai-analysis-service:8083}
api.services.routing.url=${API_ROUTING_SERVICE_URL:http://routing-service:8084}
api.services.rag.url=${API_RAG_SERVICE_URL:http://rag-service:8085}


# ============================================
# LOGGING CONFIGURATION (GCP)
# ============================================
logging.level.root=INFO
logging.level.com.aisupport.gateway=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
spring.mvc.log-request-details=false


# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false


# ============================================
# SERVICE DISCOVERY STRATEGY (GCP)
# ============================================
# In GCP, use explicit service URLs rather than Eureka discovery.
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

spring.cloud.loadbalancer.enabled=false
spring.cloud.gateway.discovery.locator.enabled=false


# ============================================
# SPRING CLOUD GATEWAY CORS CONFIGURATION
# ============================================
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=Authorization,Content-Type,X-Correlation-Id
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].exposed-headers=X-Access-Token-Refresh


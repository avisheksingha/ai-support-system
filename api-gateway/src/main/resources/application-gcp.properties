# ===============================================
# SERVICE DISCOVERY STRATEGY (GCP)
# ===============================================
# In GCP, use explicit service URLs rather than Eureka discovery.
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

spring.cloud.loadbalancer.enabled=false
spring.cloud.gateway.discovery.locator.enabled=false

# ===============================================
# GATEWAY ROUTES (GCP)
# ===============================================
# Override lb:// routes with explicit URLs (Cloud Run/GKE service endpoints).
spring.cloud.gateway.routes[0].id=TICKET-SERVICE
spring.cloud.gateway.routes[0].uri=${API_TICKET_SERVICE_URL:http://ticket-service:8082}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/tickets/**

spring.cloud.gateway.routes[1].id=AI-ANALYSIS-SERVICE
spring.cloud.gateway.routes[1].uri=${API_AI_ANALYSIS_SERVICE_URL:http://ai-analysis-service:8083}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/analysis/**

spring.cloud.gateway.routes[2].id=ROUTING-SERVICE
spring.cloud.gateway.routes[2].uri=${API_ROUTING_SERVICE_URL:http://routing-service:8084}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/routing/**

spring.cloud.gateway.routes[3].id=RAG-SERVICE
spring.cloud.gateway.routes[3].uri=${API_RAG_SERVICE_URL:http://rag-service:8085}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/rag/**

# ============================================
# ACTUATOR CONFIGURATION (GCP)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ===============================================
# LOGGING CONFIGURATION (GCP)
# ===============================================
logging.level.root=INFO
logging.level.com.aisupport.gateway=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
spring.mvc.log-request-details=false

# ===============================================
# SPRING CLOUD GATEWAY CORS CONFIGURATION
# ===============================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# ============================================
# EUREKA CLIENT CONFIGURATION (Docker)
# ============================================
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=api-gateway
eureka.instance.prefer-ip-address=true


# ============================================
# OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha


# ============================================
# LOGGING CONFIGURATION (Docker)
# ============================================
logging.level.root=INFO
logging.level.com.aisupport.gateway=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
spring.mvc.log-request-details=false


# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true


# ============================================
# SPRING CLOUD GATEWAY CORS CONFIGURATION
# ============================================
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowed-headers=Authorization,Content-Type,X-Correlation-Id
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].exposed-headers=X-Access-Token-Refresh


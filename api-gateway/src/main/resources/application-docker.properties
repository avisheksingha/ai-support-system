# ===============================================
# EUREKA CLIENT CONFIGURATION (Docker)
# ===============================================
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=api-gateway
eureka.instance.prefer-ip-address=true

# ============================================
# ACTUATOR CONFIGURATION (Docker)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ===============================================
# LOGGING CONFIGURATION (Docker)
# ===============================================
logging.level.root=INFO
logging.level.com.aisupport.gateway=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
spring.mvc.log-request-details=false

# ===============================================
# SPRING CLOUD GATEWAY CORS CONFIGURATION
# ===============================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=Authorization,Content-Type,X-Correlation-Id

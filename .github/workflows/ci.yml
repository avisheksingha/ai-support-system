name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  backend-build:
    name: Build Backend Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        run: mvn -f aisupport-parent/pom.xml clean install -DskipTests

  frontend-build-and-test:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-support-dashboard
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./ai-support-dashboard/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Component Tests (Vitest)
        run: npx vitest run
        
      - name: E2E Tests (Playwright)
        run: npx playwright test
        
      - name: Build and Analyze
        run: npm run build

name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_EC2_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            mkdir -p ~/ai-support-system
            cd ~/ai-support-system

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            fi

            git fetch --all
            git reset --hard origin/${{ github.ref_name }}

            # Ensure docker is available
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing docker (Ubuntu/Debian apt-get)..."
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            # Pick compose command: prefer 'docker compose' (v2), fallback to 'docker-compose'
            COMPOSE_CMD=""
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "No compose found. Installing docker-compose binary..."
              # try install compose plugin first (apt), then fall back to static binary
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin || true
              if docker compose version >/dev/null 2>&1; then
                COMPOSE_CMD="docker compose"
              else
                sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
                sudo chmod +x /usr/local/bin/docker-compose
                COMPOSE_CMD="docker-compose"
              fi
            fi

            echo "Using compose command: $COMPOSE_CMD"
            
            # Create the .env file securely from GitHub Secrets
            echo "DB_USERNAME=\${{ secrets.DB_USERNAME }}" > .env
            echo "DB_PASSWORD=\${{ secrets.DB_PASSWORD }}" >> .env
            echo "JWT_SECRET=\${{ secrets.JWT_SECRET }}" >> .env
            echo "GEMINI_API_KEY=\${{ secrets.GEMINI_API_KEY }}" >> .env
            
            sudo $COMPOSE_CMD -f infra/docker-compose.yml up -d --build

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4



      # 4. Build Docker images for each service
      - name: Build Docker images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/discovery-service:latest -f discovery-service/Dockerfile .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest -f api-gateway/Dockerfile .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ticket-service:latest -f ticket-service/Dockerfile .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-analysis-service:latest -f ai-analysis-service/Dockerfile .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/routing-service:latest -f routing-service/Dockerfile .

      # 5. Push images to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/discovery-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ticket-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-analysis-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/routing-service:latest

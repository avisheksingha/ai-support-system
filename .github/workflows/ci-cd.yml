name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - master
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev
      - master
  workflow_dispatch:

# Default token permissions for every job in this workflow.
# Individual jobs can request more if they ever need it (none do today).
permissions:
  contents: read

jobs:
  backend-build-test:
    name: Build and Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - discovery-service
          - api-gateway
          - auth-service
          - ticket-service
          - ai-analysis-service
          - routing-service
          - rag-service
          - ai-orchestration-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install parent POM
        run: mvn -B -ntp -f aisupport-parent/pom.xml -N install

      - name: Install common library
        run: mvn -B -ntp -f common-library/pom.xml clean install -DskipTests

      - name: Build and test module
        run: mvn -B -ntp -f ${{ matrix.module }}/pom.xml clean test

  frontend-build-test:
    name: Frontend - Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-support-dashboard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./ai-support-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Component Tests (Vitest)
        run: npx vitest run

      - name: E2E Tests (Playwright)
        run: npx playwright test

      - name: Build and Analyze
        run: npm run build

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-build-test
      - frontend-build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/master')
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Docker images
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        env:
          DOCKER_USER: ${{ env.DOCKER_USERNAME }}
        run: |
          docker build -t ${DOCKER_USER}/discovery-service:latest -f discovery-service/Dockerfile .
          docker build -t ${DOCKER_USER}/api-gateway:latest -f api-gateway/Dockerfile .
          docker build -t ${DOCKER_USER}/auth-service:latest -f auth-service/Dockerfile .
          docker build -t ${DOCKER_USER}/ticket-service:latest -f ticket-service/Dockerfile .
          docker build -t ${DOCKER_USER}/ai-analysis-service:latest -f ai-analysis-service/Dockerfile .
          docker build -t ${DOCKER_USER}/routing-service:latest -f routing-service/Dockerfile .
          docker build -t ${DOCKER_USER}/rag-service:latest -f rag-service/Dockerfile .

      - name: Push Docker images
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        env:
          DOCKER_USER: ${{ env.DOCKER_USERNAME }}
        run: |
          docker push ${DOCKER_USER}/discovery-service:latest
          docker push ${DOCKER_USER}/api-gateway:latest
          docker push ${DOCKER_USER}/auth-service:latest
          docker push ${DOCKER_USER}/ticket-service:latest
          docker push ${DOCKER_USER}/ai-analysis-service:latest
          docker push ${DOCKER_USER}/routing-service:latest
          docker push ${DOCKER_USER}/rag-service:latest
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - discovery-service
          - api-gateway
          - ticket-service
          - ai-analysis-service
          - routing-service
          - rag-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install parent POM
        run: mvn -B -ntp -f aisupport-parent/pom.xml -N install

      - name: Install common library
        run: mvn -B -ntp -f common-library/pom.xml clean install -DskipTests

      - name: Build and test module
        run: mvn -B -ntp -f ${{ matrix.module }}/pom.xml clean test

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Docker images
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        env:
          DOCKER_USER: ${{ env.DOCKER_USERNAME }}
        run: |
          docker build -t ${DOCKER_USER}/discovery-service:latest -f discovery-service/Dockerfile .
          docker build -t ${DOCKER_USER}/api-gateway:latest -f api-gateway/Dockerfile .
          docker build -t ${DOCKER_USER}/ticket-service:latest -f ticket-service/Dockerfile .
          docker build -t ${DOCKER_USER}/ai-analysis-service:latest -f ai-analysis-service/Dockerfile .
          docker build -t ${DOCKER_USER}/routing-service:latest -f routing-service/Dockerfile .
          docker build -t ${DOCKER_USER}/rag-service:latest -f rag-service/Dockerfile .

      - name: Push Docker images
        if: ${{ env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        env:
          DOCKER_USER: ${{ env.DOCKER_USERNAME }}
        run: |
          docker push ${DOCKER_USER}/discovery-service:latest
          docker push ${DOCKER_USER}/api-gateway:latest
          docker push ${DOCKER_USER}/ticket-service:latest
          docker push ${DOCKER_USER}/ai-analysis-service:latest
          docker push ${DOCKER_USER}/routing-service:latest
          docker push ${DOCKER_USER}/rag-service:latest

  gcp-deploy:
    name: Build, Push to Artifact Registry, Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_ARTIFACT_REGISTRY_REPO: ${{ vars.GCP_ARTIFACT_REGISTRY_REPO }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      SERVICES: discovery-service api-gateway ticket-service ai-analysis-service routing-service rag-service
      SERVICE_PORTS: discovery-service=8761 api-gateway=8080 ticket-service=8082 ai-analysis-service=8083 routing-service=8084 rag-service=8085

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight GCP deployment configuration
        id: preflight
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GCP_PROJECT_ID}" || -z "${GCP_REGION}" || -z "${GCP_ARTIFACT_REGISTRY_REPO}" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping GCP deploy. Set repository variables: GCP_PROJECT_ID, GCP_REGION, GCP_ARTIFACT_REGISTRY_REPO."
            exit 0
          fi

          if [[ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER}" || -z "${GCP_SERVICE_ACCOUNT}" ]] && [[ -z "${GCP_SA_KEY}" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping GCP deploy. Configure WIF (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT) or GCP_SA_KEY secret."
            exit 0
          fi

          if [[ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER}" && -n "${GCP_SERVICE_ACCOUNT}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "auth_method=wif" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ -n "${GCP_SA_KEY}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "auth_method=key" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

      - name: Authenticate to Google Cloud
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        shell: bash
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push images to Artifact Registry
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        id: image-meta
        timeout-minutes: 20
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::7}"
          REGISTRY="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY_REPO}"

          echo "${SERVICES}" | tr ' ' '\n' | while read SERVICE; do
            IMAGE="${REGISTRY}/${SERVICE}:${TAG}"
            IMAGE_LATEST="${REGISTRY}/${SERVICE}:latest"
            echo "Building and pushing ${SERVICE}..."
            docker build -t "${IMAGE}" -f "${SERVICE}/Dockerfile" .
            docker tag "${IMAGE}" "${IMAGE_LATEST}"
            docker push "${IMAGE}"
            docker push "${IMAGE_LATEST}"
          done

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "registry=${REGISTRY}" >> "${GITHUB_OUTPUT}"

      - name: Deploy services to Cloud Run
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY="${{ steps.image-meta.outputs.registry }}"
          TAG="${{ steps.image-meta.outputs.tag }}"

          echo "${SERVICES}" | tr ' ' '\n' | while read SERVICE; do
            PORT=$(echo "${SERVICE_PORTS}" | tr ' ' '\n' | grep "^${SERVICE}=" | cut -d'=' -f2)
            echo "Deploying ${SERVICE} to Cloud Run on port ${PORT}..."
            gcloud run deploy "${SERVICE}" \
              --image "${REGISTRY}/${SERVICE}:${TAG}" \
              --region "${GCP_REGION}" \
              --project "${GCP_PROJECT_ID}" \
              --platform managed \
              --port "${PORT}" \
              --allow-unauthenticated \
              --set-env-vars "SPRING_PROFILES_ACTIVE=gcp" \
              --quiet
          done

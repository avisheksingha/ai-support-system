# ============================================
# DATABASE CONFIGURATION (GCP)
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_support}?currentSchema=auth_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}


# ============================================
# JPA/HIBERNATE CONFIGURATION (GCP)
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC


# ============================================
# DOWNSTREAM SERVICE URLS (GCP)
# ============================================
api.services.ticket.url=${API_TICKET_SERVICE_URL:http://ticket-service:8082}
api.services.ai-analysis.url=${API_AI_ANALYSIS_SERVICE_URL:http://ai-analysis-service:8083}
api.services.routing.url=${API_ROUTING_SERVICE_URL:http://routing-service:8084}
api.services.rag.url=${API_RAG_SERVICE_URL:http://rag-service:8085}


# ============================================
# LOGGING CONFIGURATION (GCP)
# ============================================
logging.level.root=INFO
logging.level.com.aisupport=INFO
logging.level.org.springframework.web=INFO
spring.mvc.log-request-details=false


# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false


# ============================================
# SERVICE DISCOVERY STRATEGY (GCP)
# ============================================
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false


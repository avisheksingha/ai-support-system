# ===============================================
# DATABASE CONFIGURATION (GCP)
# ===============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_support}?currentSchema=auth_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# ============================================
# JPA/HIBERNATE CONFIGURATION (GCP)
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===============================================
# SERVICE DISCOVERY STRATEGY (GCP)
# ===============================================
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# ===============================================
# LOGGING CONFIGURATION (GCP)
# ===============================================
logging.level.root=INFO
logging.level.com.aisupport=INFO
logging.level.org.springframework.web=INFO
spring.mvc.log-request-details=false
